# Server
server.port=8080

# Database
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/vetclinic}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Run schema.sql on startup (creates tables if they don't exist)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=86400000

# CORS (allow React dev server)
cors.allowed-origins=http://localhost:5173

# Logging
logging.level.com.vetclinic=DEBUG
logging.level.org.springframework.jdbc=DEBUG

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_USERNAME:noreply@petrix.com}
app.mail.enabled=${MAIL_ENABLED:false}
