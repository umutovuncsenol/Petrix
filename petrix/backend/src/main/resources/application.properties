# Server
server.port=8080

# Database — update credentials for your local PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/vetclinic
spring.datasource.username=umutovuncsenol
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Run schema.sql on startup (creates tables if they don't exist)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# JWT
jwt.secret=VetClinicSecretKey2024SuperSecureBase64EncodedStringForHMACSHA256Algorithm
jwt.expiration-ms=86400000

# CORS (allow React dev server)
cors.allowed-origins=http://localhost:5173

# Logging
logging.level.com.vetclinic=DEBUG
logging.level.org.springframework.jdbc=DEBUG
