services:
  db:
    image: postgres:16
    container_name: vetclinic_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vetclinic
      POSTGRES_USER: vetuser
      POSTGRES_PASSWORD: vetpass
    ports:
      - "5433:5432"
    volumes:
      - vetclinic_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vetuser -d vetclinic"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: vetclinic_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/vetclinic
      SPRING_DATASOURCE_USERNAME: vetuser
      SPRING_DATASOURCE_PASSWORD: vetpass
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: vetclinic_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_BACKEND_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  vetclinic_data:
